<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRON - Premium Education</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <div style="padding: 30px; text-align: center; font-weight: bold; font-size: 24px; color: #00f2ff; letter-spacing: 2px;">
            ASTRON
        </div>
        
        <div class="nav-item active" data-section="home" onclick="openSection('home')">🏠 Home</div>
        <div class="nav-item" data-section="courses" onclick="openSection('courses')">📚 Classes</div>
        <div class="nav-item" data-section="notes" onclick="openSection('notes')">📝 Notes</div>
        <div class="nav-item" data-section="videos" onclick="openSection('videos')">🎥 Videos</div>
        <div class="nav-item" data-section="books" onclick="openSection('books')">📖 Books</div>

        <div style="margin-top: auto; padding: 20px;">
            <select id="languageSelect" onchange="changeLanguage()" style="width: 100%; padding: 8px; background: #0a0e27; color: #fff; border: 1px solid #00f2ff;">
                <option value="hindi">Hindi</option>
                <option value="english">English</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div class="glowing-sphere"></div>

        <section id="home-section" class="section active">
            <h1 style="font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 10px #00f2ff;">ASTRON में आपका स्वागत है</h1>
            <p style="font-size: 18px; color: #00f2ff; margin-bottom: 40px;">भारत का सर्वश्रेष्ठ शिक्षा मंच</p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div class="card">
                    <h2>Live News</h2>
                    <div id="home-news-ticker" style="margin-top: 15px;">Loading news...</div>
                </div>
                <div class="card">
                    <h2>Premium Picks</h2>
                    <p style="margin-top: 15px;">Top resources for RBSE Board 2026.</p>
                </div>
            </div>
        </section>

        <section id="books-section" class="section">
            <h2 style="font-size: 32px; border-bottom: 2px solid #00f2ff; display: inline-block; padding-bottom: 10px;">Board Textbooks</h2>
            <div class="books-grid cards-grid">
                </div>
        </section>

        </div>

    <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDCB - Rajasthan Board</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header><h1 class="neon-text">EDCB</h1></header>
    
    <div class="main-container">
        <div class="dignitary-grid">
            <div class="card"><img id="cm-photo" src="" alt="CM"><h3>Hon'ble CM</h3></div>
            <div class="card"><img id="edu-photo" src="" alt="Minister"><h3>Education Minister</h3></div>
        </div>

        <div class="content-layout">
            <section class="card">
                <h2 class="neon-blue">Latest News</h2>
                <div id="news-list"></div>
            </section>

            <section class="card">
                <h2 class="neon-blue">YouTube Videos</h2>
                <div id="video-grid"></div>
            </section>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
